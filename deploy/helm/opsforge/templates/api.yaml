apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opsforge.fullname" . }}-api
  labels:
    {{- include "opsforge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.api.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "opsforge.name" . }}
      app.kubernetes.io/component: api
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "opsforge.name" . }}
        app.kubernetes.io/component: api
    spec:
      containers:
        - name: api
          image: {{ include "opsforge.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["api"]
          ports:
            - containerPort: {{ .Values.api.port }}
          env:
            {{- include "opsforge.env" . | nindent 12 }}
          readinessProbe:
            httpGet:
              path: /healthz
              port: {{ .Values.api.port }}
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
---
apiVersion: v1
kind: Service
metadata:
  name: {{ include "opsforge.fullname" . }}-api
  labels:
    {{- include "opsforge.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  selector:
    app.kubernetes.io/name: {{ include "opsforge.name" . }}
    app.kubernetes.io/component: api
  ports:
    - port: 80
      targetPort: {{ .Values.api.port }}
