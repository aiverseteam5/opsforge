apiVersion: v1
kind: Secret
metadata:
  name: {{ include "opsforge.fullname" . }}-secrets
  labels:
    {{- include "opsforge.labels" . | nindent 4 }}
type: Opaque
stringData:
  fernet-key: {{ required "fernetKey is required (Fernet master key)" .Values.fernetKey | quote }}
  webhook-secret: {{ required "webhookSecret is required (HMAC secret for inbound webhooks — generate with: openssl rand -hex 32)" .Values.webhookSecret | quote }}
  token-hmac-secret: {{ required "tokenHmacSecret is required (HMAC key for API token hashing — see values.yaml for generation command)" .Values.tokenHmacSecret | quote }}
  slack-bot-token: {{ .Values.slackBotToken | quote }}
  slack-signing-secret: {{ .Values.slackSigningSecret | quote }}
