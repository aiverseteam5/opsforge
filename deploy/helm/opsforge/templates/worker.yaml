apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "opsforge.fullname" . }}-worker
  labels:
    {{- include "opsforge.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.worker.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: {{ include "opsforge.name" . }}
      app.kubernetes.io/component: worker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: {{ include "opsforge.name" . }}
        app.kubernetes.io/component: worker
    spec:
      containers:
        - name: worker
          image: {{ include "opsforge.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["worker"]
          env:
            {{- include "opsforge.env" . | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
