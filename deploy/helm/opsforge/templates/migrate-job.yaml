apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "opsforge.fullname" . }}-migrate-{{ .Release.Revision }}
  labels:
    {{- include "opsforge.labels" . | nindent 4 }}
  annotations:
    # Run migrations before api/worker on every install/upgrade.
    "helm.sh/hook": pre-install,pre-upgrade
    "helm.sh/hook-weight": "0"
    "helm.sh/hook-delete-policy": before-hook-creation,hook-succeeded
spec:
  backoffLimit: 3
  template:
    metadata:
      labels:
        {{- include "opsforge.labels" . | nindent 8 }}
    spec:
      restartPolicy: Never
      containers:
        - name: migrate
          image: {{ include "opsforge.image" . }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args: ["migrate"]
          env:
            {{- include "opsforge.env" . | nindent 12 }}
