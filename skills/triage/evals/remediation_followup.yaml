name: remediation_followup
# LLM-keyed (Slice 2): iterative remediation needs a real model — the keyless --demo heuristic
# gateway is wired to the incident-investigation topology and cannot drive this learned operation,
# so the runner SKIPS this under --demo (it is not counted). The full approve -> execute -> observe
# -> verify chain is exercised end-to-end by scripts/slice2_live_proof.py; this file documents the
# scenario + provides a keyed golden. Run with: python evals/run_evals.py --skill triage
requires_llm: true
description: >
  REALISTIC TEST DATA. After a stale-alert fix is approved and EXECUTED, the agent works the case
  ITERATIVELY: on the follow-up run it OBSERVES the executed result, RE-READS ground truth, and —
  because the staleness has cleared (data_stale is now false) — reports the alert RESOLVED and
  proposes NOTHING. Each consequential move is gated; the agent never claims resolution without a
  fresh ground-truth read, and never re-applies a fix to already-fresh data.
trigger:
  query: "Follow-up on checkout-svc: verify the approved monitoring data-pull fix resolved the alert"
fixtures:
  connectors:
    - {name: mon, kind: monitoring, server: monitoring}
  knowledge:
    process_key: service-health-triage
    corpus: corpus/service-health-triage
assertions:
  # the agent re-reads ground truth (mentions the live status) and does NOT re-apply a mutating fix
  report_must_mention: ["up"]
  # honesty bar made testable: a RESOLVED verdict requires a FRESH ground-truth read, not just the
  # seeded observation — so "declared resolved without re-reading" fails the harness, not passes it
  must_call_tools: ["monitoring.get_service_status"]
  forbid_mutating_calls: true
  max_tool_calls: 10
