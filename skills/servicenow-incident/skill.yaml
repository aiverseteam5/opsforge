schema: opsforge/skill/v1
slug: servicenow-incident
version: 0.1.0
name: ServiceNow incident response
description: >
  Investigates a ServiceNow incident: pulls the incident + CMDB CIs + SLA,
  correlates the operational graph and change timeline, gathers telemetry, and
  produces an evidence-chained RCA. May propose a write-back (work note / state
  update / change request) and an infra remediation — all behind approval.
triggers: [manual, event]
inputs:
  - {name: query, type: string, required: true}
  - {name: incident_ref, type: string, required: false}
context:
  graph: true
  change_window_hours: 24
tools:
  - {tool: servicenow.get_incident, class: read_only}
  - {tool: servicenow.search_incidents, class: read_only}
  - {tool: servicenow.get_related_cis, class: read_only}
  - {tool: servicenow.get_sla, class: read_only}
  - {tool: kubernetes.list_pods, class: read_only}
  - {tool: kubernetes.get_events, class: read_only}
  - {tool: kubernetes.get_logs, class: read_only, redact: true}
  - {tool: kubernetes.list_deployments, class: read_only}
  - {tool: datadog.query_metrics, class: read_only}
proposals:
  - {tool: servicenow.add_work_note, class: reversible}
  - {tool: servicenow.update_incident, class: reversible}
  - {tool: servicenow.create_change, class: reversible}
  - {tool: kubernetes.rollback_deploy, class: reversible,
     rollback: {tool: kubernetes.rollback_deploy, note: "roll forward"}}
policy:
  max_tool_calls: 30
  max_runtime_seconds: 420
  forbidden_targets: []
report:
  format: rca_v1
evals:
  - evals/itsm_incident.yaml
