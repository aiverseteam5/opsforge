schema: opsforge/skill/v1
slug: ops-assistant
version: 0.1.0
name: Operations assistant
description: >
  The conversational operations assistant (Cursor-for-Ops). Answers the operator's
  natural-language questions grounded in OpsForge's validated knowledge, and — as later
  milestones wire them — proposes operational actions that route through the trust ladder.
  G2: it INVESTIGATES freely over the read-only knowledge plane and answers with evidence.
triggers: [manual]
inputs:
  - {name: query, type: string, required: true}
  - {name: process_key, type: string, required: false}
context:
  graph: false
  change_window_hours: 24
# Internal read-only tools (kb.*): the investigate surface over the validated knowledge
# plane. Every one is class read_only, so the trust ladder never gates them — reads are
# always safe. No connector, no credential. Actions arrive in G3 via `proposals`.
tools:
  - {tool: kb.list_processes, class: read_only}
  - {tool: kb.process, class: read_only}
  - {tool: kb.search_knowledge, class: read_only}
  - {tool: kb.findings, class: read_only}
# G3: the agent may PROPOSE a remediation; the deterministic policy engine disposes. A
# reversible action on a NON-production target, grounded in HIGH-confidence validated
# knowledge, with a declared rollback, auto-executes (the safe majority); anything
# destructive, production-touching, low-grounded, or irreversible gates to a human. The
# connector + its environment tag are configured by the operator. The agent CANNOT bypass
# this — it only proposes.
proposals:
  - tool: kubernetes.rollback_deploy
    class: reversible
    rollback: {tool: kubernetes.redeploy, params: {}}
subagents: []
policy:
  max_tool_calls: 12
  max_runtime_seconds: 180
  forbidden_targets: []
report:
  format: rca_v1
